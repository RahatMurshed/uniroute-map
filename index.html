  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#CC1B1B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UniRoute" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/uniroute-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/uniroute-logo.png" />

    <meta property="og:title" content="UniRoute — Real-Time Bus Tracker">
    <meta property="og:description" content="UniRoute real-time bus tracking. See live bus locations, ETAs, and schedules.">
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/87b66911-799c-4df4-b6b1-cb2513a68c7f/id-preview-ea84a911--16957694-8a89-440e-bafa-ebb447f9aad4.lovable.app-1771668160348.png">
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Loading screen styles -->
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #1A1A2E;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        transition: opacity 0.4s ease;
      }
      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-screen .logo-img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash-screen .name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: white;
        letter-spacing: -0.5px;
      }
      #splash-screen .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: rgba(255,255,255,0.6);
      }
      #splash-screen .dots {
        display: flex;
        gap: 6px;
      }
      #splash-screen .dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.5);
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      #splash-screen .dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-screen .dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>

  <body>
    <!-- Loading splash screen -->
    <div id="splash-screen">
      <img src="/uniroute-logo.png" alt="UniRoute" class="logo-img" />
      <div class="name">UniRoute</div>
      <div class="subtitle">Real-Time Bus Tracker</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
